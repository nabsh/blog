baseurl      = "https://mellow-sprinkles-d4a2d0.netlify.app/"
title        = "My Blog"
languageCode = "en-us"
theme = "hello-friend-ng" 
paginate     = 10

contentDir   = "content"


[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  # Subtitle for home
  homeSubtitle = "Another blog about economics and other things"

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false

  # Enable sharing buttons, if you like
  enableSharingButtons = true

  # Metadata mostly used in document's head
  description = "Another economics blog"
  keywords = "homepage, blog, economics, économie"
  images = [""]

[taxonomies]
    category = "blog"
    tag      = "tags"
    series   = "series"

[languages]
  [languages.en]
    title = "Welcome on Nabil's blog"
    subtitle = "Nabil Sheikh Hassan"
    keywords = ""
    copyright = '<a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">CC BY-NC-SA 4.0</a>'
    readOtherPosts = "Read more"

    [languages.en.params.logo]
      logoText = "Nabil's personnal page"
      logoHomeLink = "/"
    # or
    #
    # path = "/img/your-example-logo.svg"
    # alt = "Your example logo alt text"




  # And you can even create generic menu
  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "about/"
  [[menu.main]]
    identifier = "posts"
    name       = "Posts"
    url        = "posts/"